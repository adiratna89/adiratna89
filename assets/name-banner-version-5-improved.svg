<svg width="800" height="170" viewBox="0 0 800 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { box-sizing: border-box; }

        .wrap {
          width: 800px;
          height: 170px;
          position: relative;
          overflow: hidden;
          border-radius: 16px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          background:
            radial-gradient(circle at 18% 20%, rgba(56,189,248,0.10), transparent 18%),
            radial-gradient(circle at 82% 28%, rgba(255,0,76,0.12), transparent 22%),
            linear-gradient(135deg, #020617 0%, #0f172a 44%, #111827 78%, #00F5D4 100%);
          font-family: Arial, Helvetica, sans-serif;
        }

        @keyframes titleGradient {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        @keyframes subtitleGradient {
          0% { background-position: 100% 50%; }
          50% { background-position: 0% 50%; }
          100% { background-position: 100% 50%; }
        }

        @keyframes revealTitle {
          0%, 14% {
            clip-path: inset(0 50% 0 50%);
            opacity: 0;
            filter: blur(3px);
          }
          34%, 78% {
            clip-path: inset(0 0 0 0);
            opacity: 1;
            filter: blur(0);
          }
          100% {
            clip-path: inset(0 50% 0 50%);
            opacity: 0;
            filter: blur(3px);
          }
        }

        @keyframes revealSubtitle {
          0%, 36% {
            opacity: 0;
            transform: translateY(8px);
          }
          50%, 78% {
            opacity: 1;
            transform: translateY(0);
          }
          100% {
            opacity: 0;
            transform: translateY(8px);
          }
        }

        @keyframes glowLine {
          0%, 100% {
            opacity: 0.34;
            transform: scaleX(0.97);
          }
          50% {
            opacity: 0.92;
            transform: scaleX(1.02);
          }
        }

        @keyframes shimmer {
          0%, 100% { opacity: 0.18; }
          50% { opacity: 0.58; }
        }

        @keyframes floatDot {
          0%, 100% { transform: translateY(0px); opacity: 0.28; }
          50% { transform: translateY(-5px); opacity: 0.84; }
        }

        @keyframes fall1 {
          0%   { transform: translateY(-40px) translateX(0px) rotate(0deg); opacity: 0; }
          15%  { opacity: 0.9; }
          55%  { transform: translateY(66px) translateX(6px) rotate(90deg); opacity: 0.95; }
          100% { transform: translateY(150px) translateX(-4px) rotate(180deg); opacity: 0.12; }
        }

        @keyframes fall2 {
          0%   { transform: translateY(-42px) translateX(0px) rotate(0deg); opacity: 0; }
          15%  { opacity: 0.9; }
          55%  { transform: translateY(70px) translateX(-7px) rotate(110deg); opacity: 0.95; }
          100% { transform: translateY(152px) translateX(5px) rotate(210deg); opacity: 0.12; }
        }

        @keyframes fall3 {
          0%   { transform: translateY(-46px) translateX(0px) rotate(0deg); opacity: 0; }
          15%  { opacity: 0.88; }
          55%  { transform: translateY(72px) translateX(7px) rotate(100deg); opacity: 0.92; }
          100% { transform: translateY(154px) translateX(-5px) rotate(220deg); opacity: 0.10; }
        }

        @keyframes fall4 {
          0%   { transform: translateY(-38px) translateX(0px) rotate(0deg) scale(0.9); opacity: 0; }
          18%  { opacity: 0.95; }
          58%  { transform: translateY(74px) translateX(-9px) rotate(130deg) scale(1.02); opacity: 0.96; }
          100% { transform: translateY(156px) translateX(8px) rotate(240deg) scale(0.88); opacity: 0.14; }
        }

        @keyframes fall5 {
          0%   { transform: translateY(-44px) translateX(0px) rotate(0deg) scale(0.92); opacity: 0; }
          16%  { opacity: 0.94; }
          54%  { transform: translateY(68px) translateX(10px) rotate(120deg) scale(1.04); opacity: 0.98; }
          100% { transform: translateY(158px) translateX(-7px) rotate(250deg) scale(0.86); opacity: 0.12; }
        }

        @keyframes slashLeftTravel {
          0%, 10% {
            opacity: 0;
            left: 50%;
            transform: translate(-50%, -50%) rotate(128deg) scaleY(0.12);
          }
          14% {
            opacity: 1;
            left: 50%;
            transform: translate(-50%, -50%) rotate(128deg) scaleY(1);
          }
          30% {
            opacity: 1;
            left: calc(50% - 280px);
            transform: translate(-50%, -50%) rotate(128deg) scaleY(1);
          }
          76% {
            opacity: 0.96;
            left: calc(50% - 340px);
            transform: translate(-50%, -50%) rotate(128deg) scaleY(1);
          }
          100% {
            opacity: 0;
            left: 50%;
            transform: translate(-50%, -50%) rotate(128deg) scaleY(0.12);
          }
        }

        @keyframes slashRightTravel {
          0%, 10% {
            opacity: 0;
            left: 50%;
            transform: translate(-50%, -50%) rotate(52deg) scaleY(0.12);
          }
          14% {
            opacity: 1;
            left: 50%;
            transform: translate(-50%, -50%) rotate(52deg) scaleY(1);
          }
          30% {
            opacity: 1;
            left: calc(50% + 280px);
            transform: translate(-50%, -50%) rotate(52deg) scaleY(1);
          }
          76% {
            opacity: 0.96;
            left: calc(50% + 340px);
            transform: translate(-50%, -50%) rotate(52deg) scaleY(1);
          }
          100% {
            opacity: 0;
            left: 50%;
            transform: translate(-50%, -50%) rotate(52deg) scaleY(0.12);
          }
        }

        @keyframes leftMaskSweep {
          0%, 12% {
            opacity: 1;
            left: 50%;
          }
          30% {
            opacity: 1;
            left: calc(50% - 240px);
          }
          76% {
            opacity: 0.84;
            left: calc(50% - 330px);
          }
          100% {
            opacity: 0;
            left: 50%;
          }
        }

        @keyframes rightMaskSweep {
          0%, 12% {
            opacity: 1;
            right: 50%;
          }
          30% {
            opacity: 1;
            right: calc(50% - 280px);
          }
          76% {
            opacity: 0.84;
            right: calc(50% - 340px);
          }
          100% {
            opacity: 0;
            right: 50%;
          }
        }

        @keyframes slashRGBFlow {
          0%   { background-position: 0% 0%; }
          50%  { background-position: 100% 100%; }
          100% { background-position: 0% 0%; }
        }

        @keyframes slashBreath {
          0%, 100% {
            filter: saturate(1) brightness(0.96);
            opacity: 0.86;
          }
          50% {
            filter: saturate(1.35) brightness(1.18);
            opacity: 1;
          }
        }

        .title-wrap {
          position: relative;
          width: 100%;
          display: flex;
          justify-content: center;
          align-items: center;
          margin-top: 26px;
          z-index: 3;
        }

        .title-wrap::before,
        .title-wrap::after {
          content: "";
          position: absolute;
          top: 8px;
          width: 168px;
          height: 92px;
          z-index: 3;
          pointer-events: none;
          opacity: 0;
          background: linear-gradient(
            90deg,
            rgba(2,6,23,0.98),
            rgba(2,6,23,0.68),
            rgba(2,6,23,0)
          );
        }

        .title-wrap::before {
          left: calc(50% - 84px);
          transform: translateX(-100%) skewX(-38deg);
          animation: leftMaskSweep 4.9s ease-in-out infinite;
        }

        .title-wrap::after {
          right: calc(50% - 84px);
          transform: translateX(100%) skewX(38deg);
          animation: rightMaskSweep 4.9s ease-in-out infinite;
        }

        h1 {
          margin: 0;
          padding: 0 14px;
          font-size: 3.74em;
          font-weight: 900;
          font-style: italic;
          line-height: 1.06;
          letter-spacing: -0.02em;
          text-align: center;
          white-space: nowrap;
          max-width: 100%;
          position: relative;
          z-index: 2;
          color: transparent;
          background: linear-gradient(
            270deg,
            #ff004c 0%,
            #ff335f 10%,
            #ffffff 34%,
            #38bdf8 54%,
            #ff3366 76%,
            #7c3aed 92%,
            #1e3a8a 100%
          );
          background-size: 320% 100%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          text-shadow: 0 0 12px rgba(255,0,76,0.15);
          clip-path: inset(0 50% 0 50%);
          animation:
            titleGradient 3s linear infinite,
            revealTitle 4.9s cubic-bezier(0.22, 1, 0.36, 1) infinite;
        }

        .edge-slashes {
          position: absolute;
          inset: 0;
          pointer-events: none;
          z-index: 4;
        }

        .slash-left,
        .slash-right {
          position: absolute;
          top: 52%;
          width: 4px;
          height: 105px;
          border-radius: 999px;
          background: linear-gradient(
            180deg,
            rgba(255,255,255,0),
            #ff004c 16%,
            #ff7a00 34%,
            #ffe600 48%,
            #00f5d4 64%,
            #38bdf8 80%,
            #7c3aed 92%,
            rgba(255,255,255,0)
          );
          background-size: 100% 220%;
          box-shadow:
            0 0 10px rgba(255,255,255,0.46),
            0 0 16px rgba(255,0,76,0.30),
            0 0 20px rgba(0,245,212,0.24),
            0 0 24px rgba(124,58,237,0.20);
          transform-origin: center center;
        }

        .slash-left {
          animation:
            slashLeftTravel 4.9s ease-in-out infinite,
            slashRGBFlow 2.2s linear infinite,
            slashBreath 2.8s ease-in-out infinite;
        }

        .slash-right {
          animation:
            slashRightTravel 4.9s ease-in-out infinite,
            slashRGBFlow 2.2s linear infinite reverse,
            slashBreath 2.8s ease-in-out infinite .25s;
        }

        .shine-left,
        .shine-right {
          position: absolute;
          top: 61px;
          width: 108px;
          height: 2px;
          background: linear-gradient(
            90deg,
            rgba(255,255,255,0),
            rgba(255,255,255,0.75),
            rgba(255,255,255,0)
          );
          filter: blur(0.3px);
          opacity: 0.24;
          z-index: 1;
          animation: shimmer 2.6s ease-in-out infinite;
        }

        .shine-left {
          left: 138px;
          transform: rotate(-8deg);
        }

        .shine-right {
          right: 138px;
          transform: rotate(8deg);
          animation-delay: 1.1s;
        }

        h5 {
          margin: 14px 0 0 0;
          font-size: 1.22em;
          font-weight: 700;
          letter-spacing: 0.10em;
          text-align: center;
          position: relative;
          z-index: 3;
          color: transparent;
          background: linear-gradient(
            270deg,
            #38bdf8 0%,
            #ffffff 28%,
            #ff77a8 58%,
            #00F5D4 100%
          );
          background-size: 260% 100%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          opacity: 0;
          animation:
            subtitleGradient 3.4s linear infinite,
            revealSubtitle 4.9s ease-in-out infinite;
        }

        .line-wrap {
          position: relative;
          width: 600px;
          height: 18px;
          margin-top: 18px;
          z-index: 2;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .line {
          width: 560px;
          height: 3px;
          border-radius: 999px;
          background: linear-gradient(
            90deg,
            rgba(0,245,212,0),
            rgba(0,245,212,0.78),
            rgba(255,255,255,0.92),
            rgba(255,0,76,0.74),
            rgba(255,0,76,0)
          );
          box-shadow:
            0 0 10px rgba(0,245,212,0.34),
            0 0 14px rgba(255,0,76,0.22);
          animation: glowLine 2.8s ease-in-out infinite;
        }

        .dot {
          z-index: 2;
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: rgba(255,255,255,0.72);
          box-shadow: 0 0 10px rgba(56,189,248,0.42);
          animation: floatDot 3s ease-in-out infinite;
        }

        .flake {
          position: absolute;
          z-index: 6;
          pointer-events: none;
          user-select: none;
          color: rgba(255,255,255,0.94);
          text-shadow:
            0 0 9px rgba(255,255,255,0.34),
            0 0 16px rgba(56,189,248,0.24),
            0 0 20px rgba(255,0,76,0.14);
        }

        .d1 { top: 18px; left: 210px; animation-delay: .4s; }
        .d2 { top: 24px; right: 220px; animation-delay: 1.2s; }
        .d3 { top: 118px; left: 190px; animation-delay: 2s; }
        .d4 { top: 122px; right: 190px; animation-delay: 2.6s; }

        .f1 { top: 2px; left: 72px; font-size: 14px; animation: fall1 5.6s linear infinite; }
        .f2 { top: 8px; right: 82px; font-size: 15px; animation: fall2 6.1s linear infinite .8s; }
        .f3 { top: 0px; left: 148px; font-size: 16px; animation: fall3 6.6s linear infinite 1.5s; }
        .f4 { top: 4px; right: 156px; font-size: 17px; animation: fall1 5.9s linear infinite 1.2s; }
        .f5 { top: -2px; left: 318px; font-size: 18px; animation: fall4 6.0s linear infinite .4s; }
        .f6 { top: 1px; right: 304px; font-size: 19px; animation: fall5 6.4s linear infinite 1s; }
      </style>

      <div class="wrap">
        <div class="flake f1">✦</div>
        <div class="flake f2">✧</div>
        <div class="flake f3">❄</div>
        <div class="flake f4">✦</div>
        <div class="flake f5">❄</div>
        <div class="flake f6">✧</div>

        <div class="dot d1"></div>
        <div class="dot d2"></div>
        <div class="dot d3"></div>
        <div class="dot d4"></div>

        <div class="shine-left"></div>
        <div class="shine-right"></div>

        <div class="title-wrap">
          <h1>Adiratna Kamble</h1>

          <div class="edge-slashes">
            <div class="slash-left"></div>
            <div class="slash-right"></div>
          </div>
        </div>

        <h5>DATA SCIENCE | MACHINE LEARNING | ANALYTICS</h5>

        <div class="line-wrap">
          <div class="line"></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
