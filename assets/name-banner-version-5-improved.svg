<svg fill="none" viewBox="0 0 800 170" width="800" height="170" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradientText {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        @keyframes subtitleGradient {
          0% { background-position: 100% 50%; }
          50% { background-position: 0% 50%; }
          100% { background-position: 100% 50%; }
        }

        @keyframes glowLine {
          0%, 100% { opacity: 0.35; transform: scaleX(0.96); }
          50% { opacity: 1; transform: scaleX(1.03); }
        }

        @keyframes floatDot {
          0%, 100% { transform: translateY(0px); opacity: 0.30; }
          50% { transform: translateY(-5px); opacity: 0.85; }
        }

        @keyframes fall1 {
          0%   { transform: translateY(-38px) translateX(0px); opacity: 0; }
          15%  { opacity: 1; }
          55%  { transform: translateY(62px) translateX(6px); opacity: 1; }
          100% { transform: translateY(148px) translateX(-4px); opacity: 0.16; }
        }

        @keyframes fall2 {
          0%   { transform: translateY(-42px) translateX(0px); opacity: 0; }
          15%  { opacity: 1; }
          55%  { transform: translateY(66px) translateX(-7px); opacity: 1; }
          100% { transform: translateY(150px) translateX(5px); opacity: 0.16; }
        }

        @keyframes fall3 {
          0%   { transform: translateY(-46px) translateX(0px); opacity: 0; }
          15%  { opacity: 1; }
          55%  { transform: translateY(70px) translateX(7px); opacity: 1; }
          100% { transform: translateY(152px) translateX(-5px); opacity: 0.14; }
        }

        @keyframes fall4 {
          0%   { transform: translateY(-44px) translateX(0px); opacity: 0; }
          15%  { opacity: 1; }
          55%  { transform: translateY(72px) translateX(-8px); opacity: 1; }
          100% { transform: translateY(154px) translateX(6px); opacity: 0.14; }
        }

        @keyframes twinkle {
          0%, 100% { opacity: 0.28; transform: scale(0.92); }
          50% { opacity: 1; transform: scale(1.16); }
        }

        .wrap {
          width: 100%;
          height: 100%;
          position: relative;
          overflow: hidden;
          border-radius: 16px;
          background:
            radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.12), transparent 20%),
            radial-gradient(circle at 80% 30%, rgba(255, 0, 76, 0.14), transparent 24%),
            linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 78%, #00F5D4 100%);
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        h1 {
          margin: 0.30em 0 0.08em 0;
          font-size: 4.10em;
          font-weight: 900;
          letter-spacing: -0.04em;
          text-align: center;
          font-family: Arial, sans-serif;
          position: relative;
          z-index: 2;
          background: linear-gradient(
            270deg,
            #ff004c 0%,
            #ff335f 10%,
            #ffffff 34%,
            #38bdf8 54%,
            #ff3366 76%,
            #7c3aed 92%,
            #1e3a8a 100%
          );
          background-size: 320% 100%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: gradientText 3s linear infinite;
          text-shadow: 0 0 14px rgba(255, 0, 76, 0.18);
        }

        h5 {
          margin: 0;
          font-size: 1.34em;
          font-weight: 700;
          letter-spacing: 0.10em;
          text-align: center;
          font-family: Arial, sans-serif;
          position: relative;
          z-index: 2;
          background: linear-gradient(
            270deg,
            #38bdf8 0%,
            #ffffff 28%,
            #ff77a8 58%,
            #00F5D4 100%
          );
          background-size: 260% 100%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: subtitleGradient 3.4s linear infinite;
        }

        .line {
          width: 600px;
          height: 3.7px;
          margin-top: 10px;
          border-radius: 999px;
          background: linear-gradient(
            90deg,
            rgba(0,245,212,0),
            rgba(0,245,212,0.98),
            rgba(255,255,255,1),
            rgba(255,0,76,0.95),
            rgba(255,0,76,0)
          );
          box-shadow: 0 0 14px rgba(0,245,212,0.55), 0 0 22px rgba(255,0,76,0.38);
          animation: glowLine 2.8s ease-in-out infinite;
          position: relative;
          z-index: 2;
        }

        .flake, .dot {
          position: absolute;
          z-index: 1;
          user-select: none;
          pointer-events: none;
        }

        .flake {
          color: rgba(255,255,255,0.90);
          text-shadow: 0 0 8px rgba(255,255,255,0.34);
        }

        .f1 { top: 4px; left: 90px; font-size: 13px; animation: fall1 5.8s linear infinite; }
        .f2 { top: 6px; right: 95px; font-size: 11px; animation: fall2 6.4s linear infinite 0.7s; }
        .f3 { top: 2px; left: 55px; font-size: 14px; animation: fall3 6.0s linear infinite 1.2s; }
        .f4 { top: 3px; right: 58px; font-size: 15px; animation: fall4 6.8s linear infinite 1.8s; }
        .f5 { top: 8px; left: 170px; font-size: 10px; animation: fall1 5.2s linear infinite 0.9s; }
        .f6 { top: 10px; right: 170px; font-size: 10px; animation: fall2 6.1s linear infinite 1.4s; }

        .dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: rgba(255,255,255,0.72);
          box-shadow: 0 0 10px rgba(56, 189, 248, 0.42);
          animation: floatDot 3s ease-in-out infinite;
        }

        .d1 { top: 20px; left: 210px; animation-delay: .4s; }
        .d2 { top: 26px; right: 220px; animation-delay: 1.2s; }
        .d3 { top: 116px; left: 190px; animation-delay: 2s; }
        .d4 { top: 120px; right: 190px; animation-delay: 2.6s; }
      </style>

      <div class="wrap">
        <div class="flake f1">✦</div>
        <div class="flake f2">✦</div>
        <div class="flake f3">❄</div>
        <div class="flake f4">❄</div>
        <div class="flake f5">✧</div>
        <div class="flake f6">✧</div>

        <div class="dot d1"></div>
        <div class="dot d2"></div>
        <div class="dot d3"></div>
        <div class="dot d4"></div>

        <h1>Adiratna Kamble</h1>
        <h5>Data Science | Machine Learning | Analytics</h5>
        <div class="line"></div>
      </div>
    </div>
  </foreignObject>
</svg>
