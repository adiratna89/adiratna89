<svg fill="none" viewBox="0 0 800 140" width="800" height="140" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradientText {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        @keyframes twinkle {
          0%, 100% { opacity: 0.25; transform: scale(0.9); }
          50% { opacity: 1; transform: scale(1.18); }
        }

        @keyframes floatDot {
          0%, 100% { transform: translateY(0px); opacity: 0.30; }
          50% { transform: translateY(-5px); opacity: 0.85; }
        }

        @keyframes glowLine {
          0%, 100% { opacity: 0.35; transform: scaleX(0.96); }
          50% { opacity: 1; transform: scaleX(1.02); }
        }

        .wrap {
          width: 100%;
          height: 100%;
          position: relative;
          overflow: hidden;
          border-radius: 16px;
          background:
            radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.12), transparent 20%),
            radial-gradient(circle at 80% 30%, rgba(255, 0, 76, 0.14), transparent 24%),
            linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 78%, #00F5D4 100%);
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        h1 {
          margin: 0.42em 0 0.06em 0;
          font-size: 3em;
          font-weight: 900;
          letter-spacing: -.05em;
          text-align: center;
          background: -webkit-linear-gradient(right, #3828ca, #ff004c, #38bdf8, #ffffff, #ff004c);
          background: linear-gradient(270deg, #3828ca 0%, #ff004c 30%, #38bdf8 60%, #ffffff 80%, #ff004c 100%);
          background-size: 300%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: gradientText 4s ease infinite;
          font-family: Arial, sans-serif;
          text-shadow: 0 0 14px rgba(255, 0, 76, 0.20);
          position: relative;
          z-index: 2;
        }

        h5 {
          margin: 0;
          font-size: 1em;
          font-weight: 700;
          letter-spacing: .08em;
          text-align: center;
          background: -webkit-linear-gradient(right, #38bdf8, #ffffff, #ff77a8, #00F5D4);
          background: linear-gradient(270deg, #38bdf8 0%, #ffffff 35%, #ff77a8 70%, #00F5D4 100%);
          background-size: 260%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: gradientText 4s ease infinite;
          font-family: Arial, sans-serif;
          position: relative;
          z-index: 2;
        }

        .line {
          width: 320px;
          height: 4px;
          margin-top: 10px;
          border-radius: 999px;
          background: linear-gradient(90deg, rgba(0,245,212,0), rgba(0,245,212,0.98), rgba(255,255,255,1), rgba(255,0,76,0.95), rgba(255,0,76,0));
          box-shadow: 0 0 14px rgba(0,245,212,0.55), 0 0 22px rgba(255,0,76,0.38);
          animation: glowLine 2.8s ease-in-out infinite;
          position: relative;
          z-index: 2;
        }

        .flake, .dot {
          position: absolute;
          z-index: 1;
          user-select: none;
          pointer-events: none;
        }

        .flake {
          color: rgba(255,255,255,0.88);
          text-shadow: 0 0 8px rgba(255,255,255,0.35);
          animation: twinkle 2.6s ease-in-out infinite;
        }

        .dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: rgba(255,255,255,0.72);
          box-shadow: 0 0 10px rgba(56, 189, 248, 0.42);
          animation: floatDot 3s ease-in-out infinite;
        }

        .f1 { top: 18px; left: 90px; font-size: 13px; animation-delay: 0s; }
        .f2 { top: 25px; right: 105px; font-size: 11px; animation-delay: .7s; }
        .f3 { top: 78px; left: 55px; font-size: 12px; animation-delay: 1.4s; }
        .f4 { top: 82px; right: 58px; font-size: 13px; animation-delay: 2.1s; }
        .f5 { top: 42px; left: 170px; font-size: 9px; animation-delay: 1s; }
        .f6 { top: 48px; right: 170px; font-size: 9px; animation-delay: 1.8s; }

        .d1 { top: 22px; left: 210px; animation-delay: .4s; }
        .d2 { top: 32px; right: 220px; animation-delay: 1.2s; }
        .d3 { top: 95px; left: 190px; animation-delay: 2s; }
        .d4 { top: 98px; right: 190px; animation-delay: 2.6s; }
      </style>

      <div class="wrap">
        <div class="flake f1">✦</div>
        <div class="flake f2">✦</div>
        <div class="flake f3">❄</div>
        <div class="flake f4">❄</div>
        <div class="flake f5">✧</div>
        <div class="flake f6">✧</div>

        <div class="dot d1"></div>
        <div class="dot d2"></div>
        <div class="dot d3"></div>
        <div class="dot d4"></div>

        <h1>Adiratna Kamble</h1>
        <h5>Data Science | Machine Learning | Analytics</h5>
        <div class="line"></div>
      </div>
    </div>
  </foreignObject>
</svg>
