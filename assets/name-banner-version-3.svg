<svg fill="none" viewBox="0 0 800 400" width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradientText {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        .wrap {
          width: 100%;
          height: 100%;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          background: linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 75%, #00F5D4 100%);
        }

        h1 {
          margin: 0;
          font-size: 4.8em;
          font-weight: 900;
          letter-spacing: -0.05em;
          text-align: center;
          line-height: 1.05;
          background: linear-gradient(270deg, #ffffff, #00F5D4, #38BDF8, #ffffff);
          background-size: 200%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: gradientText 3s ease infinite;
          font-family: Arial, sans-serif;
        }

        h5 {
          margin: 16px 0 0 0;
          font-size: 1.15em;
          font-weight: 600;
          letter-spacing: 0.08em;
          text-align: center;
          color: #DFFCF8;
          font-family: Arial, sans-serif;
        }
      </style>

      <div class="wrap">
        <h1>Adiratna Kamble</h1>
        <h5>Data Science | Machine Learning | Analytics</h5>
      </div>
    </div>
  </foreignObject>
</svg>
