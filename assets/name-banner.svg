<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0f172a"/>
      <stop offset="0.75" stop-color="#111827"/>
      <stop offset="1" stop-color="#00F5D4"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="260" rx="0" fill="url(#bg)"/>

  <circle cx="130" cy="58" r="2.5" fill="#DFFCF8" filter="url(#glow)"/>
  <circle cx="1080" cy="62" r="2.5" fill="#DFFCF8" filter="url(#glow)"/>
  <circle cx="210" cy="188" r="2" fill="#B8FFF6"/>
  <circle cx="1010" cy="182" r="2" fill="#B8FFF6"/>
  <circle cx="320" cy="42" r="1.8" fill="#E8FFFD"/>
  <circle cx="890" cy="42" r="1.8" fill="#E8FFFD"/>

  <g stroke="#C8FFF9" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <g transform="translate(160 110)">
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
      <line x1="-7" y1="-7" x2="7" y2="7"/>
      <line x1="-7" y1="7" x2="7" y2="-7"/>
    </g>
    <g transform="translate(1035 108)">
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
      <line x1="-7" y1="-7" x2="7" y2="7"/>
      <line x1="-7" y1="7" x2="7" y2="-7"/>
    </g>
    <g transform="translate(255 70) scale(0.75)">
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
      <line x1="-7" y1="-7" x2="7" y2="7"/>
      <line x1="-7" y1="7" x2="7" y2="-7"/>
    </g>
    <g transform="translate(940 170) scale(0.75)">
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
      <line x1="-7" y1="-7" x2="7" y2="7"/>
      <line x1="-7" y1="7" x2="7" y2="-7"/>
    </g>
  </g>

  <line x1="250" y1="85" x2="950" y2="85" stroke="#7DEDE1" stroke-opacity="0.18"/>
  <line x1="220" y1="190" x2="980" y2="190" stroke="#7DEDE1" stroke-opacity="0.12"/>

  <text x="600" y="138"
        text-anchor="middle"
        font-size="54"
        font-weight="700"
        font-family="Verdana, Segoe UI, sans-serif"
        fill="#FFFFFF"
        stroke="#00F5D4"
        stroke-width="1.2"
        paint-order="stroke fill"
        filter="url(#glow)">
    Adiratna Kamble
  </text>

  <text x="600" y="176"
        text-anchor="middle"
        font-size="20"
        font-weight="500"
        font-family="Verdana, Segoe UI, sans-serif"
        fill="#D7FFFB">
    Data Science | Machine Learning | Analytics
  </text>

  <ellipse cx="600" cy="146" rx="280" ry="46" fill="#00F5D4" opacity="0.06" filter="url(#soft)"/>
</svg>
