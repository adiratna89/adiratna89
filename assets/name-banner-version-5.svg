<svg fill="none" viewBox="0 0 800 120" width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradientText {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        @keyframes twinkle {
          0%, 100% { opacity: 0.3; transform: scale(0.9); }
          50% { opacity: 1; transform: scale(1.15); }
        }

        .wrap {
          width: 100%;
          height: 100%;
          position: relative;
          overflow: hidden;
          background: linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 75%, #00F5D4 100%);
          border-radius: 14px;
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        h1 {
          margin: 0.50em 0 0.08em 0;
          font-size: 3em;
          font-weight: 900;
          letter-spacing: -.05em;
          text-align: center;
          background: -webkit-linear-gradient(right,#3828ca,#ff004c);
          background: linear-gradient(270deg,#3828ca 0,#ff004c);
          background-size: 200%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          -webkit-animation: home_name-animation__3Ydoo 3s ease infinite;
          animation: gradientText 3s ease infinite;
          font-family: Arial, sans-serif;
          text-shadow: 0 0 10px rgba(255, 0, 76, 0.18);
          position: relative;
          z-index: 2;
        }

        h5 {
          margin: 0;
          font-size: 1em;
          font-weight: 700;
          letter-spacing: .08em;
          text-align: center;
          background: -webkit-linear-gradient(right,#3828ca,#ff004c);
          background: linear-gradient(270deg,#3828ca 0,#ff004c);
          background-size: 200%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          -webkit-animation: home_name-animation__3Ydoo 3s ease infinite;
          animation: gradientText 3s ease infinite;
          font-family: Arial, sans-serif;
          position: relative;
          z-index: 2;
        }

        .flake {
          position: absolute;
          color: rgba(255,255,255,0.85);
          font-size: 14px;
          animation: twinkle 2.4s ease-in-out infinite;
          z-index: 1;
        }

        .f1 { top: 18px; left: 110px; animation-delay: 0s; }
        .f2 { top: 26px; right: 120px; animation-delay: .6s; }
        .f3 { top: 72px; left: 70px; animation-delay: 1.2s; }
        .f4 { top: 76px; right: 78px; animation-delay: 1.8s; }
      </style>

      <div class="wrap">
        <div class="flake f1">✦</div>
        <div class="flake f2">✦</div>
        <div class="flake f3">❄</div>
        <div class="flake f4">❄</div>

        <h1>Adiratna Kamble</h1>
        <h5>Data Science | Machine Learning | Analytics</h5>
      </div>
    </div>
  </foreignObject>
</svg>
