<svg fill="none" viewBox="0 0 800 120" width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradientText {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        h1 {
          margin: 0.50em 0 0.08em 0;
          font-size: 3em;
          font-weight: 900;
          letter-spacing: -.05em;
          text-align: center;
          background: -webkit-linear-gradient(right,#3828ca,#ff004c);
          background: linear-gradient(270deg,#3828ca 0,#ff004c);
          background-size: 200%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          -webkit-animation: home_name-animation__3Ydoo 3s ease infinite;
          animation: gradientText 3s ease infinite;
        }

        h5 {
          margin: 0;
          font-size: 1em;
          font-weight: 700;
          letter-spacing: .08em;
          text-align: center;
          background: -webkit-linear-gradient(right,#3828ca,#ff004c);
          background: linear-gradient(270deg,#3828ca 0,#ff004c);
          background-size: 200%;
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          -webkit-animation: home_name-animation__3Ydoo 3s ease infinite;
          animation: gradientText 3s ease infinite;
        }
      </style>
      <h1>Adiratna Kamble</h1>
      <h5>Data Science | Machine Learning | Analytics</h5>
    </div>
  </foreignObject>
</svg>
